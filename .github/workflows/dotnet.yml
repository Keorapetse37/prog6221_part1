name: .NET Console CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest # Required for System.Media dependencies

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x # Change to your targeted .NET version if different
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
